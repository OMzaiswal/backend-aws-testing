name: Docker Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST2 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY2 }}
          script: |
            if [ ! -d ~/backend-docker ]; then
              git clone https://github.com/OMzaiswal/backend-aws-testing.git ~/backend-docker
            fi

            cd ~/backend-docker

            git pull origin main

            docker build -t backend-app .

            docker stop backend-container || true
            docker rm backend-container || true

            docker run -d -p 3000:3000 --name backend-container backend-app